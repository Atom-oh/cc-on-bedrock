AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CC-on-Bedrock LiteLLM Stack - Internal ALB, ASG, RDS PostgreSQL, Serverless Valkey, ECR.
  Equivalent to cdk/lib/03-litellm-stack.ts and terraform/modules/litellm.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  VpcCidr:
    Type: String
  PrivateSubnetAId:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnetCId:
    Type: AWS::EC2::Subnet::Id
  IsolatedSubnetAId:
    Type: AWS::EC2::Subnet::Id
  IsolatedSubnetCId:
    Type: AWS::EC2::Subnet::Id
  KmsKeyArn:
    Type: String
  KmsKeyId:
    Type: String
  LitellmEc2InstanceProfileName:
    Type: String
  LitellmMasterKeySecretArn:
    Type: String
  ValkeyAuthSecretArn:
    Type: String
  InstanceType:
    Type: String
    Default: t4g.xlarge
  RdsInstanceType:
    Type: String
    Default: db.t4g.medium

Resources:
  # ---------- RDS Credentials (created here to match CDK pattern) --------------
  RdsCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: cc-on-bedrock/rds-credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username": "litellm_admin"}'
        GenerateStringKey: password
        ExcludePunctuation: true
        PasswordLength: 24

  # ---------- ECR Repository ---------------------------------------------------
  LitellmEcrRepo:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: cc-on-bedrock/litellm
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: KMS
        KmsKey: !Ref KmsKeyArn

  # ---------- Security Groups --------------------------------------------------
  LitellmAlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM Internal ALB SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4000
          CidrIp: !Ref VpcCidr
          Description: Allow from VPC
      Tags:
        - Key: Name
          Value: cc-litellm-alb-sg

  LitellmEc2Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM EC2 SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4000
          SourceSecurityGroupId: !Ref LitellmAlbSg
          Description: Allow from ALB
      Tags:
        - Key: Name
          Value: cc-litellm-ec2-sg

  RdsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LitellmEc2Sg
          Description: Allow from LiteLLM EC2
      Tags:
        - Key: Name
          Value: cc-litellm-rds-sg

  ValkeySg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Serverless Valkey SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6380
          ToPort: 6380
          SourceSecurityGroupId: !Ref LitellmEc2Sg
          Description: Allow from LiteLLM EC2
      Tags:
        - Key: Name
          Value: cc-litellm-valkey-sg

  # ---------- Internal ALB -----------------------------------------------------
  LitellmAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: cc-litellm-internal
      Scheme: internal
      Type: application
      SecurityGroups:
        - !Ref LitellmAlbSg
      Subnets:
        - !Ref PrivateSubnetAId
        - !Ref PrivateSubnetCId
      Tags:
        - Key: Name
          Value: cc-litellm-internal-alb

  LitellmTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: cc-litellm-tg
      Port: 4000
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /health/liveness
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: cc-litellm-tg

  LitellmListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LitellmAlb
      Port: 4000
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref LitellmTargetGroup

  # ---------- RDS PostgreSQL ---------------------------------------------------
  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: cc-on-bedrock-litellm
      DBSubnetGroupDescription: Subnet group for LiteLLM RDS
      SubnetIds:
        - !Ref IsolatedSubnetAId
        - !Ref IsolatedSubnetCId
      Tags:
        - Key: Name
          Value: cc-on-bedrock-litellm

  RdsInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: cc-on-bedrock-litellm
      Engine: postgres
      EngineVersion: '16'
      DBInstanceClass: !Ref RdsInstanceType
      DBName: litellm
      MasterUsername: !Sub '{{resolve:secretsmanager:${RdsCredentialsSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${RdsCredentialsSecret}:SecretString:password}}'
      AllocatedStorage: 20
      StorageType: gp3
      StorageEncrypted: true
      KmsKeyId: !Ref KmsKeyArn
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSg
      BackupRetentionPeriod: 7
      MultiAZ: false
      Tags:
        - Key: Name
          Value: cc-on-bedrock-litellm

  # ---------- ElastiCache Serverless Valkey ------------------------------------
  ValkeyCache:
    Type: AWS::ElastiCache::ServerlessCache
    Properties:
      Engine: valkey
      ServerlessCacheName: cc-on-bedrock-valkey
      SubnetIds:
        - !Ref IsolatedSubnetAId
        - !Ref IsolatedSubnetCId
      SecurityGroupIds:
        - !Ref ValkeySg

  # ---------- Launch Template + ASG --------------------------------------------
  LitellmLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: cc-litellm-lt
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref LitellmEc2InstanceProfileName
        SecurityGroupIds:
          - !Ref LitellmEc2Sg
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 50
              VolumeType: gp3
              Encrypted: true
              KmsKeyId: !Ref KmsKeyArn
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            yum install -y docker jq
            systemctl start docker
            systemctl enable docker

            # Login to ECR
            REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
            aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull and run LiteLLM
            docker pull $ECR_REGISTRY/cc-on-bedrock/litellm:latest
            docker run -d --restart always \
              --name litellm \
              -p 4000:4000 \
              -e AWS_DEFAULT_REGION=$REGION \
              -e LITELLM_MASTER_KEY_SECRET_ARN=${LitellmMasterKeySecretArn} \
              -e RDS_CREDENTIALS_SECRET_ARN=${RdsCredentialsSecret} \
              -e VALKEY_AUTH_SECRET_ARN=${ValkeyAuthSecretArn} \
              -e REDIS_HOST=$(aws elasticache describe-serverless-caches --serverless-cache-name cc-on-bedrock-valkey --query 'ServerlessCaches[0].Endpoint.Address' --output text) \
              $ECR_REGISTRY/cc-on-bedrock/litellm:latest
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: cc-litellm

  LitellmAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: cc-litellm-asg
      MinSize: '2'
      MaxSize: '4'
      DesiredCapacity: '2'
      VPCZoneIdentifier:
        - !Ref PrivateSubnetAId
        - !Ref PrivateSubnetCId
      HealthCheckType: ELB
      HealthCheckGracePeriod: 120
      TargetGroupARNs:
        - !Ref LitellmTargetGroup
      LaunchTemplate:
        LaunchTemplateId: !Ref LitellmLaunchTemplate
        Version: !GetAtt LitellmLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: cc-litellm
          PropagateAtLaunch: true

Outputs:
  InternalAlbDns:
    Description: LiteLLM internal ALB DNS name
    Value: !GetAtt LitellmAlb.DNSName
    Export:
      Name: cc-on-bedrock-litellm-alb-dns

  RdsEndpoint:
    Description: RDS endpoint address
    Value: !GetAtt RdsInstance.Endpoint.Address
    Export:
      Name: cc-on-bedrock-rds-endpoint

  RdsCredentialsSecretArn:
    Description: RDS credentials secret ARN
    Value: !Ref RdsCredentialsSecret
    Export:
      Name: cc-on-bedrock-rds-credentials-arn

  LitellmEcrRepoUri:
    Description: ECR repository URI for LiteLLM
    Value: !GetAtt LitellmEcrRepo.RepositoryUri
    Export:
      Name: cc-on-bedrock-litellm-ecr-uri
